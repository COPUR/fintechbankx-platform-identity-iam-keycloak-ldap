version: 1
owner: platform-security
description: >
  Reference-only catalog for runtime secret sourcing. This file must never contain
  secret values; it documents where values are expected to come from.

secrets:
  oauth_client_secret:
    env: OAUTH_CLIENT_SECRET
    file_env: OAUTH_CLIENT_SECRET_FILE
    file_mount_example: /var/run/secrets/openfinance/oauth_client_secret
    vault_reference: kv/data/openfinance/oauth/client-secret
    rotation_policy: "90d or immediate on incident"
    scope: "performance and security validation scripts"

controls:
  no_plaintext_values_in_repo: true
  require_file_or_runtime_injection: true
  ci_secret_hygiene_scan: true
  pii_redaction_required: true
